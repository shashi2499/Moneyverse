  .scrollcue{ position:absolute; bottom:calc(28px + var(--safe-b)); left:50%; transform:translateX(-50%);

  .scrollcue .chev{ font-size:34px; line-height:.5; margin-top:2px; }

  @media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important} }
</style>

/* =================== FX (constellation, particles, crystal, confetti) =================== */
var FX=(function(){
  var c=document.getElementById("fx"),ctx=c.getContext("2d"),W,H,dpr;
  var points=[],lit=0,bursts=[],confs=[],crystal=null,mode="idle",color=[GOLD,"#FFB877"];
  function resize(){ dpr=Math.min(window.devicePixelRatio||1,2); W=c.clientWidth;H=c.clientHeight;
    c.width=W*dpr;c.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0); layout(); }
  function layout(){ // constellation across a top band
    var n=7, bandTop=70+ (window.__safeT||0), bandH=90, m=W*0.14, span=W-m*2;
    points=[]; for(var i=0;i<n;i++){ var x=m+span*(i/(n-1)); var y=bandTop + bandH*(0.5+0.42*Math.sin(i*1.5+0.6));
      points.push({x:x,y:y}); } }
  window.addEventListener("resize",resize); resize();
  function setColor(cols){ color=cols; }
  function target(){ return points[Math.min(lit,points.length-1)]; }
  function burst(sx,sy,cols,onDone){ // particles fly from card to next star
    var tgt=target(); var arr=[];
    for(var i=0;i<26;i++){ arr.push({x:sx+(Math.random()-.5)*60,y:sy+(Math.random()-.5)*30,
      tx:tgt.x+(Math.random()-.5)*10,ty:tgt.y+(Math.random()-.5)*10,t:0,
      sp:0.018+Math.random()*0.02,c:cols[i%cols.length],r:1.5+Math.random()*2}); }
    bursts.push({parts:arr,done:false,onDone:onDone,litOnDone:true});
  }
  function lightAll(){ lit=points.length; }
  function confetti(cols){ if(reduced) return;
    for(var i=0;i<150;i++) confs.push({x:W/2+(Math.random()-.5)*140,y:H*0.4,vx:(Math.random()-.5)*13,
      vy:-Math.random()*15-4,g:.34+Math.random()*.2,s:Math.random()*8+3,rot:Math.random()*3.14,vr:(Math.random()-.5)*.32,
      c:cols.concat([GOLD,"#fff"])[(Math.random()*(cols.length+2))|0],life:0}); }
  function startCrystal(cols,onName){ mode="crystal"; lightAll();
    crystal={t:0,phase:"gather",cx:W/2,cy:H*0.42,cols:cols,onName:onName,gathered:points.map(function(p){return {x:p.x,y:p.y};})}; }
  function drawGlobe(cx,cy,scale,rot,cols,glow){
    var R=42*scale;
    ctx.save();
    if(glow){ ctx.shadowBlur=48*scale; ctx.shadowColor=cols[0]; }
    var sph=ctx.createRadialGradient(cx-R*0.32,cy-R*0.32,R*0.1,cx,cy,R);
    sph.addColorStop(0,"rgba(255,255,255,0.95)"); sph.addColorStop(0.4,cols[0]); sph.addColorStop(1,cols[2]||cols[1]);
    ctx.beginPath(); ctx.arc(cx,cy,R,0,6.28); ctx.globalAlpha=0.95; ctx.fillStyle=sph; ctx.fill(); ctx.shadowBlur=0;
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,6.28); ctx.clip();
    ctx.strokeStyle="rgba(255,255,255,0.55)"; ctx.lineWidth=1;
    for(var la=-2;la<=2;la++){ var yy=cy+la*R*0.34, rx=R*Math.sqrt(Math.max(0,1-(la*0.34)*(la*0.34)));
      ctx.globalAlpha=0.32; ctx.beginPath(); ctx.ellipse(cx,yy,rx,R*0.12,0,0,6.28); ctx.stroke(); }
    for(var lo=0;lo<6;lo++){ var ph=rot+lo*(Math.PI/6), w=Math.cos(ph);
      ctx.globalAlpha=0.24+0.32*Math.abs(w); ctx.beginPath(); ctx.ellipse(cx,cy,Math.abs(w)*R,R,0,0,6.28); ctx.stroke(); }
    ctx.restore();
    ctx.globalAlpha=0.6; ctx.strokeStyle="rgba(255,255,255,0.78)"; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.arc(cx,cy,R,0,6.28); ctx.stroke();
    ctx.restore(); ctx.globalAlpha=1;
  }
  function loop(t){
    ctx.clearRect(0,0,W,H);
    if(mode==="constellation"){
      // lines among lit
      ctx.strokeStyle="rgba(255,227,174,.5)"; ctx.lineWidth=1.4;
      for(var i=1;i<lit;i++){ ctx.beginPath(); ctx.moveTo(points[i-1].x,points[i-1].y); ctx.lineTo(points[i].x,points[i].y); ctx.stroke(); }
      for(var p=0;p<points.length;p++){ var on=p<lit;
        ctx.beginPath(); ctx.fillStyle=on?GOLD:"rgba(255,255,255,.16)";
        if(on){ ctx.shadowBlur=14; ctx.shadowColor=GOLD; } else ctx.shadowBlur=0;
        ctx.arc(points[p].x,points[p].y,on?3.4:2,0,6.28); ctx.fill(); }
      ctx.shadowBlur=0;
    }
    // bursts
    for(var b=bursts.length-1;b>=0;b--){ var B=bursts[b],allDone=true;
      for(var q=0;q<B.parts.length;q++){ var pa=B.parts[q];
        if(pa.t<1){ allDone=false; pa.t=Math.min(1,pa.t+pa.sp);
          var e=1-Math.pow(1-pa.t,3); pa.cx=pa.x+(pa.tx-pa.x)*e; pa.cy=pa.y+(pa.ty-pa.y)*e; }
        ctx.beginPath(); ctx.globalAlpha=pa.t<1?1:0; ctx.fillStyle=pa.c; ctx.shadowBlur=8; ctx.shadowColor=pa.c;
        ctx.arc(pa.cx||pa.x,pa.cy||pa.y,pa.r,0,6.28); ctx.fill(); }
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      if(allDone&&!B.done){ B.done=true; if(B.litOnDone&&lit<points.length) lit++; if(B.onDone) B.onDone(); bursts.splice(b,1); }
    }
    // crystal sequence
    if(mode==="crystal"&&crystal){
      crystal.t+=reduced?0.06:0.016; var T=crystal.t, cx=crystal.cx, cy=crystal.cy;
      if(crystal.phase==="gather"){
        var e=Math.min(1,T/0.6);
        for(var gi=0;gi<crystal.gathered.length;gi++){ var gp=crystal.gathered[gi];
          var x=gp.x+(cx-gp.x)*e, y=gp.y+(cy-gp.y)*e;
          ctx.beginPath(); ctx.fillStyle=GOLD; ctx.shadowBlur=12; ctx.shadowColor=GOLD; ctx.arc(x,y,3,0,6.28); ctx.fill(); }
        ctx.shadowBlur=0;
        if(T>=0.6){ crystal.phase="spin"; crystal.t=0; }
      } else if(crystal.phase==="spin"){
        var sc=Math.min(1.15,0.25+T*1.4);
        drawGlobe(cx,cy,sc,T*7,crystal.cols,true);
        if(T>=1.5){ crystal.phase="burst"; crystal.t=0; }
      } else if(crystal.phase==="burst"){
        drawGlobe(cx,cy,1.15,crystal.t*7+10,crystal.cols,true);
        ctx.globalAlpha=Math.min(1,crystal.t*3); ctx.strokeStyle="rgba(255,255,255,.9)"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(cx,cy,50+crystal.t*46,0,6.28); ctx.stroke(); ctx.globalAlpha=1;
        if(crystal.t>=0.35){ crystal.phase="shatter"; crystal.t=0;
          // spawn shards
          crystal.shards=[]; for(var sh=0;sh<80;sh++){ var a=Math.random()*6.28,sp=2+Math.random()*8;
            crystal.shards.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0,
              c:crystal.cols.concat([GOLD,"#fff"])[(Math.random()*(crystal.cols.length+2))|0],r:2+Math.random()*3}); }
          confetti(crystal.cols); if(crystal.onName) crystal.onName();
          // lens flare flag
          crystal.flare=1;
        }
      } else if(crystal.phase==="shatter"){
        if(crystal.flare>0){ var fg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6);
          fg.addColorStop(0,"rgba(255,255,255,"+(crystal.flare*0.5)+")"); fg.addColorStop(0.2,"rgba(255,227,174,"+(crystal.flare*0.25)+")"); fg.addColorStop(1,"rgba(255,255,255,0)");
          ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); crystal.flare-=0.03; }
        for(var s2=0;s2<crystal.shards.length;s2++){ var S2=crystal.shards[s2]; S2.life++; S2.x+=S2.vx; S2.y+=S2.vy; S2.vy+=0.12; S2.vx*=0.98;
          var al=Math.max(0,1-S2.life/70); ctx.globalAlpha=al; ctx.fillStyle=S2.c; ctx.shadowBlur=8; ctx.shadowColor=S2.c;
          ctx.beginPath(); ctx.arc(S2.x,S2.y,S2.r,0,6.28); ctx.fill(); }
        ctx.globalAlpha=1; ctx.shadowBlur=0;
        if(crystal.t>3.5) crystal=null;
      }
    }
    // confetti
    if(confs.length){ for(var ci=confs.length-1;ci>=0;ci--){ var cf=confs[ci]; cf.life++; cf.vy+=cf.g; cf.x+=cf.vx; cf.y+=cf.vy; cf.rot+=cf.vr; cf.vx*=.99;
      var a2=Math.max(0,1-cf.life/120); if(a2<=0||cf.y>H+40){ confs.splice(ci,1); continue; }
      ctx.save(); ctx.globalAlpha=a2; ctx.translate(cf.x,cf.y); ctx.rotate(cf.rot); ctx.fillStyle=cf.c; ctx.fillRect(-cf.s/2,-cf.s/2,cf.s,cf.s*.5); ctx.restore(); } }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  return { setMode:function(m){mode=m;}, setLit:function(n){lit=n;}, burst:burst, layout:layout,
    startCrystal:startCrystal, confetti:confetti, setColor:setColor, getLit:function(){return lit;}, reset:function(){lit=0;bursts=[];confs=[];crystal=null;mode="idle";} };
})();

  function tcard(banner,inner){ return '<div class="tcard">'+

  // 3 Strengths
  secs+='<section class="sec"><div class="inner">'+tcard("Your Strengths",tlist(p.strengths))+'</div></section>';
  // 4 Watch-outs
  secs+='<section class="sec"><div class="inner">'+tcard("Gentle Watch-Outs",tlist(p.watch))+'</div></section>';
  // 5 Banking
  secs+='<section class="sec"><div class="inner">'+tcard("Made For You",tlist(p.banking))+'</div></section>';
  // 6 Insights
  secs+='<section class="sec"><div class="inner">'+tcard("Monthly Insights",'<p class="dim" style="font-size:13px;margin:0 0 14px;">Once your account is live, you\'ll see:</p>'+tlist(p.insights))+'</div></section>';
  // 7 Rewards
  secs+='<section class="sec"><div class="inner">'+tcard("Your Rewards",tlist(p.rewards))+'</div></section>';
  // 8 Share
  secs+='<section class="sec"><div class="inner"><p class="kick">Your Card</p>'+
    '<div id="sharecard" style="margin:6px auto 0;"></div>'+
    '<div style="margin-top:24px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1);">'+
      '<p class="dim" style="font-size:14px;line-height:1.55;max-width:330px;margin:0 auto 14px;">To know in depth about your financial health, explore your Baroda Personal Finance Health Score.</p>'+
      '<a class="pfhs" href="https://pfhs-bob-c.netlify.app/" target="_blank" rel="noopener">Baroda Personal Finance Health Score →</a>'+
    '</div>'+
    '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;">'+
      '<button class="btn primary" id="sharebtn">Share my card</button>'+
      '<button class="btn ghost" id="copylink">Copy try-link</button></div>'+
    '<div style="display:flex;gap:10px;justify-content:center;margin-top:11px;flex-wrap:wrap;">'+
      '<button class="btn ghost" id="switch">Switch name style</button>'+
      '<button class="btn ghost" id="restart">Start over</button></div>'+
    '<p id="toast" style="opacity:0;transition:opacity .4s ease;margin-top:14px;font-size:12px;color:var(--gold);min-height:16px;">&nbsp;</p>'+
  '</div></section>';
  resultEl.innerHTML=secs;
  // transition from stage to result

  setTimeout(function(){ wrap.style.display="none"; resultEl.style.display="block"; FX.setMode("idle"); buildShareCard(); wireResult();
    AUDIO.result(st.personaKey);
    // reveal-in observer
    var obs=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting) e.target.classList.add("show"); }); },{threshold:.35});
    resultEl.querySelectorAll(".sec").forEach(function(s){ obs.observe(s); });
    resultEl.querySelector(".sec").classList.add("show");

function buildShareCard(){
  var p=st.persona, g=p.aura, big=st.vibeName?p.vibe:p.classic, small=st.vibeName?p.classic:p.vibe;
  var host=document.getElementById("sharecard");
  host.innerHTML='<div id="scard" style="position:relative;width:300px;max-width:82vw;aspect-ratio:9/16;border-radius:24px;overflow:hidden;margin:0 auto;'+
    'border:1px solid rgba(255,255,255,.16);box-shadow:0 24px 70px '+g[0]+'55;background:#06040f;">'+
    '<canvas id="sc-bg" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>'+
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:22px 20px;">'+
      '<p style="font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:'+GOLD+';font-weight:600;">MoneyVerse</p>'+
      '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;">'+
        '<div style="font-size:16px;color:'+GOLD+';letter-spacing:.4em;margin-bottom:8px;">✦</div>'+
        '<h2 style="font-size:34px;line-height:.95;text-transform:uppercase;font-weight:600;letter-spacing:-.02em;margin:2px 0 2px;color:#fff;text-shadow:0 0 22px '+g[0]+'cc;">'+big+'</h2>'+
        '<p style="font-size:11px;color:var(--dim);letter-spacing:.04em;">a.k.a. '+small+'</p>'+
        '<p style="font-family:Fraunces,serif;font-weight:300;font-size:13.5px;margin-top:14px;line-height:1.4;color:#efeaff;">“'+p.quote+'”</p>'+
      '</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;">'+
        '<div><p style="font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;">Discover yours</p><p style="font-size:11px;font-weight:600;">Banking Super App</p></div>'+
        '<canvas id="sc-qr" width="52" height="52" style="width:52px;height:52px;border-radius:8px;background:#fff;"></canvas>'+
      '</div>'+
    '</div></div>';
  drawShareBG(g); drawQR();
}
function drawShareBG(g){
  var cv=document.getElementById("sc-bg"); if(!cv) return; var dpr=Math.min(window.devicePixelRatio||1,2);
  var r=cv.getBoundingClientRect(); cv.width=r.width*dpr; cv.height=r.height*dpr; var ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  var W=r.width,H=r.height;
  ctx.fillStyle="#06040f"; ctx.fillRect(0,0,W,H);
  [[g[0],W*0.2,H*0.22,W*0.7],[g[1],W*0.8,H*0.5,W*0.75],[g[2],W*0.4,H*0.85,W*0.7]].forEach(function(b){
    var rad=ctx.createRadialGradient(b[1],b[2],0,b[1],b[2],b[3]); rad.addColorStop(0,b[0]); rad.addColorStop(1,"rgba(6,4,15,0)");
    ctx.globalAlpha=.5; ctx.fillStyle=rad; ctx.fillRect(0,0,W,H); }); ctx.globalAlpha=1;
  // stars + a small constellation
  for(var i=0;i<40;i++){ ctx.globalAlpha=Math.random()*.6+.2; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.2+.3,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  var cst=[[W*0.3,H*0.34],[W*0.44,H*0.3],[W*0.58,H*0.36],[W*0.66,H*0.3],[W*0.5,H*0.42]];
  ctx.strokeStyle="rgba(255,227,174,.5)"; ctx.lineWidth=1; ctx.beginPath();
  cst.forEach(function(pt,i){ if(i===0)ctx.moveTo(pt[0],pt[1]); else ctx.lineTo(pt[0],pt[1]); }); ctx.stroke();
  cst.forEach(function(pt){ ctx.fillStyle=GOLD; ctx.shadowBlur=8; ctx.shadowColor=GOLD; ctx.beginPath(); ctx.arc(pt[0],pt[1],2.2,0,6.28); ctx.fill(); }); ctx.shadowBlur=0;
}
function drawQR(){ var cv=document.getElementById("sc-qr"); if(!cv) return; var ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,52,52); ctx.fillStyle="#06040f"; var n=11,c=44/n,o=4;
  for(var y=0;y<n;y++)for(var x=0;x<n;x++){ if(Math.random()>.5) ctx.fillRect(o+x*c,o+y*c,c,c); }
  function finder(fx,fy){ ctx.fillStyle="#06040f"; ctx.fillRect(fx,fy,c*3,c*3); ctx.fillStyle="#fff"; ctx.fillRect(fx+c*0.6,fy+c*0.6,c*1.8,c*1.8); ctx.fillStyle="#06040f"; ctx.fillRect(fx+c,fy+c,c,c); }
  finder(o,o); finder(o+c*(n-3),o); finder(o,o+c*(n-3));
}
function wireResult(){
  var sw=document.getElementById("switch"), sh=document.getElementById("sharebtn"), rs=document.getElementById("restart"), cl=document.getElementById("copylink"), toast=document.getElementById("toast");
  function say(msg){ if(!toast) return; toast.textContent=msg; toast.style.opacity="1"; clearTimeout(toast._t); toast._t=setTimeout(function(){toast.style.opacity="0";},3400); }
  sw.onclick=function(){ beep("flip"); st.vibeName=!st.vibeName; buildShareCard();
    var sec1=resultEl.querySelector(".sec .inner h1"); if(sec1) sec1.textContent=(st.vibeName?st.persona.vibe:st.persona.classic); };
  sh.onclick=function(){ FX.confetti(st.persona.aura); shareImage(say); };
  cl.onclick=function(){ var link=location.href;
    try{ navigator.clipboard.writeText(link).then(function(){ say("Link copied — anyone can open it to try MoneyVerse"); },function(){ say("Your link: "+link); }); }
    catch(e){ say("Your link: "+link); } };
  rs.onclick=function(){ st={scores:{},used:[],current:null,qIndex:0,persona:null,vibeName:true,sound:st.sound};
    resultEl.style.display="none"; resultEl.innerHTML=""; wrap.style.display="flex"; wrap.style.opacity="1";
    FX.reset(); slowStars=false; AUDIO.stopAll(); setAura(["#5A4FE0","#37C5D6","#A45CFF"],.42); renderIntro(); };
}
function shareImage(say){
  var p=st.persona,g=p.aura,big=(st.vibeName?p.vibe:p.classic).toUpperCase(),small=st.vibeName?p.classic:p.vibe;
  var W=1080,H=1920, cv=document.createElement("canvas"); cv.width=W; cv.height=H; var x=cv.getContext("2d");
  function rr(px,py,pw,ph,r){ x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+pw,py,px+pw,py+ph,r); x.arcTo(px+pw,py+ph,px,py+ph,r); x.arcTo(px,py+ph,px,py,r); x.arcTo(px,py,px+pw,py,r); x.closePath(); }
  x.fillStyle="#06040f"; x.fillRect(0,0,W,H);
  [[g[0],W*.2,H*.2,900],[g[1],W*.82,H*.5,980],[g[2],W*.42,H*.86,940]].forEach(function(b){ var rad=x.createRadialGradient(b[1],b[2],0,b[1],b[2],b[3]); rad.addColorStop(0,b[0]); rad.addColorStop(1,"rgba(6,4,15,0)"); x.globalAlpha=.5; x.fillStyle=rad; x.fillRect(0,0,W,H); }); x.globalAlpha=1;
  for(var i=0;i<130;i++){ x.globalAlpha=Math.random()*.6+.15; x.fillStyle="#fff"; x.beginPath(); x.arc(Math.random()*W,Math.random()*H,Math.random()*2.2+.4,0,6.28); x.fill(); } x.globalAlpha=1;
  x.strokeStyle="rgba(255,227,174,.85)"; x.lineWidth=3; rr(48,48,W-96,H-96,30); x.stroke();
  x.strokeStyle="rgba(255,227,174,.4)"; x.lineWidth=1.5; rr(70,70,W-140,H-140,22); x.stroke();
  x.textAlign="center"; x.fillStyle=GOLD; x.font="34px Georgia";
  [[104,150],[W-104,150],[104,H-118],[W-104,H-118]].forEach(function(c){ x.fillText("✦",c[0],c[1]); });
  x.font="600 30px Inter, sans-serif"; x.globalAlpha=.92; x.fillText("M O N E Y V E R S E",W/2,210); x.globalAlpha=1;
  x.font="66px Georgia"; x.fillText("✦",W/2,468);
  x.font="600 30px Inter, sans-serif"; x.fillStyle="rgba(255,227,174,.9)"; x.fillText("YOUR MONEY VIBE",W/2,560);
  var fs=176; x.fillStyle="#fff"; x.font="700 "+fs+"px 'Fraunces', Georgia, serif";
  while(x.measureText(big).width>W-200&&fs>58){ fs-=6; x.font="700 "+fs+"px 'Fraunces', Georgia, serif"; }
  x.save(); x.shadowColor=g[0]; x.shadowBlur=64; x.fillText(big,W/2,702); x.restore();
  x.fillStyle="rgba(246,243,255,.6)"; x.font="30px Inter, sans-serif"; x.fillText("a.k.a. "+small,W/2,762);
  x.fillStyle="#efeaff"; x.font="italic 300 42px 'Fraunces', Georgia, serif";
  var words=("“"+p.quote+"”").split(" "),line="",yy=886,lines=[];
  words.forEach(function(w){ var t=(line+" "+w).trim(); if(x.measureText(t).width>W-260){ lines.push(line); line=w; } else line=t; }); if(line) lines.push(line);
  lines.forEach(function(l,i){ x.fillText(l,W/2,yy+i*56); });
  var baseY=1190,cst=[[W*.32,baseY],[W*.42,baseY-34],[W*.54,baseY+8],[W*.64,baseY-30],[W*.5,baseY+30]];
  x.strokeStyle="rgba(255,227,174,.5)"; x.lineWidth=1.6; x.beginPath(); cst.forEach(function(pt,i){ i?x.lineTo(pt[0],pt[1]):x.moveTo(pt[0],pt[1]); }); x.stroke();
  x.fillStyle=GOLD; cst.forEach(function(pt){ x.save(); x.shadowBlur=16; x.shadowColor=GOLD; x.beginPath(); x.arc(pt[0],pt[1],5,0,6.28); x.fill(); x.restore(); });
  x.fillStyle="rgba(255,227,174,.9)"; x.font="600 26px Inter, sans-serif"; x.fillText("DISCOVER YOUR MONEY VIBE",W/2,H-286);
  x.fillStyle="rgba(246,243,255,.55)"; x.font="24px Inter, sans-serif"; x.fillText("Banking Super App",W/2,H-248);
  var qs=124,qx=W/2-qs/2,qy=H-210; x.fillStyle="#fff"; rr(qx,qy,qs,qs,12); x.fill();
  x.fillStyle="#06040f"; var n=13,cell=(qs-16)/n,ox=qx+8,oy=qy+8;
  for(var yb=0;yb<n;yb++)for(var xb=0;xb<n;xb++){ if(Math.random()>.5) x.fillRect(ox+xb*cell,oy+yb*cell,cell,cell); }
  function fnd(fx,fy){ x.fillStyle="#06040f"; x.fillRect(fx,fy,cell*3,cell*3); x.fillStyle="#fff"; x.fillRect(fx+cell*.6,fy+cell*.6,cell*1.8,cell*1.8); x.fillStyle="#06040f"; x.fillRect(fx+cell,fy+cell,cell,cell); }
  fnd(ox,oy); fnd(ox+cell*(n-3),oy); fnd(ox,oy+cell*(n-3));
  // export (kept synchronous to preserve the share gesture on mobile)
  try{
    var data=cv.toDataURL("image/png"), bin=atob(data.split(",")[1]), arr=new Uint8Array(bin.length);
    for(var k=0;k<bin.length;k++) arr[k]=bin.charCodeAt(k);
    var blob=new Blob([arr],{type:"image/png"}), file=new File([blob],"my-money-vibe.png",{type:"image/png"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:"My Money Vibe",text:"I'm "+big+" on MoneyVerse"}).then(function(){},function(){});
      say&&say("Sharing your card…");
    } else {
      var url=URL.createObjectURL(blob),a=document.createElement("a"); a.href=url; a.download="my-money-vibe.png";
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(url);},1500);
      say&&say("Card saved as an image — send it to anyone");
    }
  }catch(e){ say&&say("Couldn't export the image on this device"); }
}

/* boot */
renderIntro();
})();
